<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoC Clan Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .chart-container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    canvas {
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>
<body>
  <h1>Clash of Clans Clan Tracker</h1>

  <div class="chart-container">
    <h3>Members Count</h3>
    <canvas id="membersChart"></canvas>
  </div>

  <div class="chart-container">
    <h3>Clan Points (Trophies)</h3>
    <canvas id="pointsChart"></canvas>
  </div>

  <div class="chart-container">
    <h3>Clan XP (approx from level)</h3>
    <canvas id="xpChart"></canvas>
  </div>

  <div class="chart-container">
    <h3>War Record (Wins vs Losses)</h3>
    <canvas id="warsChart"></canvas>
  </div>

  <script>
    let membersChart, pointsChart, xpChart, warsChart;

    async function fetchData() {
      try {
        const res = await fetch("/api/snapshots");
        const snapshots = await res.json();

        if (!snapshots.length) return;

        // Format X axis as days
        const labels = snapshots.map(s => 
          new Date(s.timestamp).toLocaleDateString()
        );

        const members = snapshots.map(s => s.members_count);
        const points = snapshots.map(s => s.clan_points);
        const xp = snapshots.map(s => s.clan_level * 1000);
        const warWins = snapshots.map(s => s.war_wins);
        const warLosses = snapshots.map(s => s.war_losses);

        // Destroy old charts before re-rendering
        if (membersChart) membersChart.destroy();
        if (pointsChart) pointsChart.destroy();
        if (xpChart) xpChart.destroy();
        if (warsChart) warsChart.destroy();

        // Members chart
        membersChart = new Chart(document.getElementById("membersChart"), {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "Members",
              data: members,
              borderColor: "blue",
              fill: false
            }]
          }
        });

        // Points chart
        pointsChart = new Chart(document.getElementById("pointsChart"), {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "Clan Points",
              data: points,
              borderColor: "green",
              fill: false
            }]
          }
        });

        // XP chart
        xpChart = new Chart(document.getElementById("xpChart"), {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "Clan XP (approx)",
              data: xp,
              borderColor: "orange",
              fill: false
            }]
          }
        });

        // War wins/losses chart
        warsChart = new Chart(document.getElementById("warsChart"), {
          type: "line",
          data: {
            labels,
            datasets: [
              { label: "War Wins", data: warWins, borderColor: "purple", fill: false },
              { label: "War Losses", data: warLosses, borderColor: "red", fill: false }
            ]
          }
        });

      } catch (err) {
        console.error("Error loading snapshots:", err);
      }
    }

    // Load immediately and refresh every 60 seconds
    fetchData();
    setInterval(fetchData, 60000);
  </script>
</body>
</html>
